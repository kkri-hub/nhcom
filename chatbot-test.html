<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAKATA HANGER Chatbot — 動作確認</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F6F4EF;
      color: #2E2E2E;
      font-family: 'EB Garamond', '游明朝', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .center {
      text-align: center;
    }
    .logo {
      font-size: 13px;
      letter-spacing: 0.2em;
      color: #4B3621;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .note {
      font-size: 12px;
      color: #8A9BB0;
      letter-spacing: 0.05em;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="center">
    <p class="logo">NAKATA HANGER</p>
    <p class="note">右下のボタンをクリックしてチャットを開いてください</p>
  </div>

  <script src="nakata-chatbot.js"></script>
</body>
</html>
